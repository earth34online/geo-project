<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自然地理知识交互系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.8);
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'SimSun', 'Songti SC', 'STSong', serif;
            overflow: hidden; /* 防止滚动条破坏华丽感 */
            height: 100vh;
            width: 100vw;
        }

        /* 华丽背景粒子 */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            filter: blur(1px);
        }

        /* 顶部导航 */
        #nav-header {
            position: fixed;
            top: 40px;
            width: 100%;
            padding: 0 50px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
            opacity: 0;
        }

        .back-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .back-btn:hover { background: white; color: black; }

        /* 主容器 */
        #main-stage {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
        }

        /* 首页大标题 */
        .home-hero h1 {
            font-size: 6rem;
            letter-spacing: 20px;
            text-align: center;
            cursor: pointer;
            font-weight: 200;
            text-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        /* 节点网格 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            width: 80%;
            max-width: 1000px;
            margin-top: -100px;
        }

        .node-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 100px 62px;
            text-align: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.6s;
            position: relative;
            overflow: hidden;
        }

        .node-card:hover {
            background: rgba(255,255,255,1);
            color: black;
            box-shadow: 0 0 50px rgba(255,255,255,0.4);
            transform: translateY(-10px) rotateX(10deg);
        }

        .node-card h2 {
            font-size: 2.4rem;
            font-weight: normal;
            text-shadow: 0 4px 15px rgba(255, 255, 255, 0.4);
            display: inline-block;
            letter-spacing: 4px; 
            transform: scaleY(1.35); 
        }

        /* 末级详情页面 */
        .detail-view {
            max-width: 900px;
            width: 90%;
            text-align: center;
        }

        .image-box {
            width: 80%;
            max-width: 500px;
            height: 400px;
            background: #111;
            margin: 20px auto; 
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 4px; /* 可选：加一点点圆角让边缘不那么生硬 */
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .placeholder-text {
            color: #444;
            /*font-family: monospace;*/
            letter-spacing: 2px;
        }

        .link-anchor {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 60px;
            border: 1px solid white;
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            letter-spacing: 4px;
            transition: 0.4s;
        }

        .link-anchor:hover {
            background: white;
            color: black;
            box-shadow: 0 0 30px white;
        }

        .desc-text {
            /* 1. 往下移动一点：将上外边距改大（比如 50px） */
            margin: 50px auto 0 auto; 
            width: 80%;
            max-width: 800px;
            
            /* 2. 字体放大：从 1.1rem 改为 1.5rem (如果觉得还不够大可以改到 1.8rem) */
            font-size: 1.5rem; 
            line-height: 2; 
            color: rgba(255, 255, 255, 0.85); 
            
            /* 3. 文本内容居中 */
            text-align: center; 
            letter-spacing: 2px;
            
            /* 4. 提供边框和内部间距 */
            border: 1px solid rgba(255, 255, 255, 0.2); /* 半透明的白色边框 */
            border-radius: 8px; /* 边框圆角，看起来更柔和精致 */
            padding: 30px; /* 让文字和边框之间留出呼吸空间，避免文字贴着边框 */
            background: rgba(255, 255, 255, 0.03); /* 添加和卡片同款的极弱背景色，增加高级感 */
            
            /* 保持原有的内部滚动功能 */
            max-height: 35vh; 
            overflow-y: auto; 
        }

        .desc-text::-webkit-scrollbar {
            width: 4px; /* 非常细的滚动条 */
        }
        .desc-text::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05); /* 透明轨道 */
        }
        .desc-text::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2); /* 半透明滑块 */
            border-radius: 2px;
        }
        .desc-text::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5); /* 鼠标悬停时变亮 */
        }

    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <header id="nav-header">
        <button class="back-btn" onclick="handleBack()">← BACK / 返回上级</button>
        <div id="breadcrumb" style="font-weight: 200; letter-spacing: 2px; color: #666;"></div>
    </header>

    <main id="main-stage">
        </main>

    <script>
        /**
         * 1. 完整数据接口 (按 Canva 层级填充)
         * --------------------------------------------------
         */
        const treeData = {
            id: "root",
            title: "自然地理知识",
            children: [
                {
                    id: "c1",
                    title: "地球与地图",
                    children: [
                        { 
                            id: "c1-1", 
                            title: "地球", 
                            children: [
                                {
                                    id: "c1-1-1",
                                    title: "形状与大小",
                                    img:"",
                                    link: "",
                                    desc:"不规则球体"
                                },
                                {
                                    id: "c1-1-2",
                                    title:"运动和影响",
                                    children: [
                                        {
                                            id: "c1-1-2-1",
                                            title: "自转",
                                            img: "",
                                            link: "",
                                            desc: "自转方向：；自转周期：<br>产生昼夜交替和时间差异"
                                        },
                                        {
                                            id: "c1-1-2-2",
                                            title:"公转",
                                            img: "",
                                            link: "",
                                            desc: "方向：；周期：<br>产生四季变化和五带划分<br>(热带、南北温带、南北寒带)"
                                        }
                                    ]
                                }
                            ]
                        },
                        { 
                            id: "c1-2", 
                            title: "地图", 
                            children: [
                                {
                                    id: "c1-2-1",
                                    title: "三要素",
                                    img: "",
                                    link: "",
                                    desc: "方向:一般指定向、指向标、经纬网<br>比例尺:公式、三种表示方式<br>小"
                                },
                                {
                                    id: "",
                                    title: "",
                                    img: "",
                                    link: "",
                                    desc: ""
                                }
                            ]
                        }
                    ]
                },
                {
                    id: "c2",
                    title: "陆地表层",
                    children: [
                        { 
                            id: "c2-1",
                            title: "地形地貌", 
                            children: [
                                {
                                    id: "",
                                    title: "",
                                    img: "",
                                    link: "",
                                    desc: ""
                                },
                                {
                                    id: "",
                                    title: "",
                                    img: "",
                                    link: "",
                                    desc: ""
                                }
                            ]
                        },
                        { 
                            id: "c2-2",
                            title: "气候与天气",
                            children: [
                                {
                                    id: "c2-2-1",
                                    title: "天气",
                                    desc: ""
                                },
                                {
                                    id: "c2-2-2",
                                    title: "气候",
                                    desc: ""
                                },
                                {
                                    id: "c2-2-3",
                                    title: "气候要素",
                                    desc: ""
                                },
                                {
                                    id: "c2-2-4",
                                    title: "影响因素",
                                    children: [
                                        {
                                            id: "c2-2-4-1",
                                            title: "维度位置",
                                            img: "",
                                            link: "",
                                            desc: "决定气温基本格局"
                                        },
                                        {
                                            id: "c2-2-4-2",
                                            title: "海陆位置",
                                            img: "",
                                            link: "",
                                            desc: ""
                                        },
                                        {
                                            id: "c2-2-4-3",
                                            title: "地形因素",
                                            img: "",
                                            link: "",
                                            desc: "海拔、迎风坡/背风坡"
                                        },
                                        {
                                            id: "c2-2-4-4",
                                            title: "世界主要气候类型",
                                            desc: ""
                                        }
                                    ]
                                }
                            ] 
                        },
                        { 
                            id: "c2-3", 
                            title: "水文", 
                            children: [
                                {
                                    id: "c2-3-1",
                                    title: "河流",
                                    img: "",
                                    link: "",
                                    desc: "从流向、流量、汛期、含沙量等方面描述特征。<br>补给类型有雨水、冰雪融水等。"
                                },
                                {
                                    id: "c2-3-2",
                                    title: "湖泊",
                                    img: "",
                                    link: "",
                                    desc: "区分淡水湖与咸水湖"
                                }
                            ]
                        }
                    ]
                },
                {
                    id: "c3",
                    title: "地球系统",
                    children: [
                        { 
                            id: "c3-1", 
                            title: "海洋与水循环",
                            children: [
                                {
                                    id: "c3-1-1",
                                    title: "海陆分布",
                                    img: "",
                                    link: "",
                                    desc: "七大洲、四大洋的名称与轮廓"
                                },
                                {
                                    id: "c3-1-2",
                                    title: "海陆变迁",
                                    img: "",
                                    link: "",
                                    desc: "原因（如板块运动）、证据"
                                },
                                {
                                    id: "c3-1-3",
                                    title: "水循环",
                                    img: "",
                                    link: "",
                                    desc: "蒸发、水汽输送、降水、地表/地下径流等环节"
                                }
                            ]
                        },
                        { 
                            id: "c3-2", 
                            title: "自然环境整体性", 
                            img: "", 
                            link: "" ,
                            desc: "地形、气候、水文、土壤、植被等要素相互联系、相互制约"
                        }
                    ]
                },
                {
                    id: "c4",
                    title: "区域自然地理",
                    children: [
                        { 
                            id: "c4-1", 
                            title: "中国地理", 
                            children: [
                                {
                                    id: "",
                                    title: "",
                                    img: "",
                                    link: "",
                                    desc: ""
                                },
                                {
                                    id: "",
                                    title: "",
                                    img: "",
                                    link: "",
                                    desc: ""
                                },
                                {
                                    id: "",
                                    title: "",
                                    img: "",
                                    link: "",
                                    desc: ""
                                },
                                {
                                    id: "",
                                    title: "",
                                    img: "",
                                    link: "",
                                    desc: ""
                                }
                            ] 
                        },
                        { 
                            id: "c4-2", 
                            title: "世界地理", 
                            children: [
                                {
                                    id: "",
                                    title: "",
                                    img: "",
                                    link: "",
                                    desc: ""
                                }
                            ]
                        }
                    ]
                }
            ]
        };

        // 状态管理
        let currentState = treeData;
        let historyStack = [];
        const stage = document.getElementById('main-stage');
        const header = document.getElementById('nav-header');

        /**
         * 2. 核心渲染逻辑
         */
        function render() {
            stage.innerHTML = '';
            
            // 更新面包屑和返回按钮
            header.style.opacity = currentState.id === 'root' ? 0 : 1;
            document.getElementById('breadcrumb').innerText = historyStack.map(i => i.title).join(' / ');

            if (currentState.id === "root") {
                // 渲染首页
                const div = document.createElement('div');
                div.className = 'home-hero';
                div.innerHTML = `<h1>${currentState.title}</h1>`;
                div.onclick = () => navigateTo(currentState); 
                stage.appendChild(div);
                gsap.from(div, { duration: 2, opacity: 0, y: 50, ease: "expo.out" });

            } else if (currentState.children && currentState.children.length > 0) {
                // 渲染分支层级 (Grid 布局)
                const grid = document.createElement('div');
                grid.className = 'grid-container';
                
                currentState.children.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'node-card';
                    card.innerHTML = `<h2>${item.title}</h2>`;
                    card.onclick = () => navigateTo(item);
                    grid.appendChild(card);
                    
                    gsap.from(card, {
                        duration: 1,
                        opacity: 0,
                        y: 100,
                        rotateX: -45,
                        delay: index * 0.1,
                        ease: "power4.out"
                    });
                });
                stage.appendChild(grid);

            } else {
                // 渲染末端内容页
                const detail = document.createElement('div');
                detail.className = 'detail-view';
                detail.innerHTML = `
                    <h1 style="font-size:3rem; font-weight:normal; letter-spacing:8px; text-shadow:0 4px 15px rgba(255,255,255,0.4); transform:scaleY(1.05); display:inline-block;">${currentState.title}</h1>
                    
                    <div class="image-box">
                        <a href="${currentState.link || '#'}" target="_blank" style="display: block; width: 100%; height: 100%; text-decoration: none;">
                            ${currentState.img 
                                ? `<img src="${currentState.img}" style="cursor: pointer; width: 100%; height: 100%; object-fit: cover;">` 
                                : `<div class="placeholder-text" style="cursor: pointer; height: 100%; display: flex; align-items: center; justify-content: center;">[ IMAGE INTERFACE: ${currentState.title} ]</div>`
                            }
                        </a>
                    </div>

                    <div class="desc-text">
                        ${currentState.desc || '暂无解释性文字。请在代码的 desc 字段中输入内容。'}
                    </div>
                `;
                stage.appendChild(detail);
                gsap.from(detail, { duration: 1, opacity: 0, scale: 0.9, ease: "power2.out" });
            }
        }

        function navigateTo(node) {
            // 如果是首页点击，我们实际上是想进入它的 children 层级
            const nextTarget = (node.id === 'root') ? { ...node, id: 'first_level' } : node;
            
            gsap.to(stage, { duration: 0.5, opacity: 0, scale: 1.1, onComplete: () => {
                historyStack.push(currentState);
                currentState = nextTarget;
                render();
                gsap.to(stage, { duration: 0.5, opacity: 1, scale: 1 });
            }});
        }

        function handleBack() {
            if (historyStack.length > 0) {
                gsap.to(stage, { duration: 0.5, opacity: 0, scale: 0.9, onComplete: () => {
                    currentState = historyStack.pop();
                    render();
                    gsap.to(stage, { duration: 0.5, opacity: 1, scale: 1 });
                }});
            }
        }

        /**
         * 3. 华丽背景动画 (Canvas)
         */
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speedX: Math.random() * 0.2 - 0.1,
                    speedY: Math.random() * 0.2 - 0.1
                });
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            particles.forEach(p => {
                p.x += p.speedX; p.y += p.speedY;
                if(p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if(p.y < 0 || p.y > canvas.height) p.speedY *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animate();
        
        // 首次加载
        render();

    </script>
</body>
</html>
