<head>

    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.8);
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'SimSun', 'Songti SC', 'STSong', serif;
            overflow: hidden; /* 防止滚动条破坏华丽感 */
            height: 100vh;
            width: 100vw;
        }

        /* 华丽背景粒子 */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            filter: blur(1px);
        }

        /* 顶部导航 */
        #nav-header {
            position: fixed;
            top: 40px;
            width: 100%;
            padding: 0 50px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
            opacity: 0;
        }

        .back-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .back-btn:hover { background: white; color: black; }

        /* 主容器 */
        #main-stage {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
        }

        /* 首页大标题 */
        .home-hero h1 {
            font-size: 6rem;
            letter-spacing: 20px;
            text-align: center;
            cursor: pointer;
            font-weight: 200;
            text-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        /* 节点网格 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            width: 80%;
            max-width: 1000px;
            margin-top: -100px;
        }

        .node-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 100px 62px;
            text-align: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.6s;
            position: relative;
            overflow: hidden;
        }

        .node-card:hover {
            background: rgba(255,255,255,1);
            color: black;
            box-shadow: 0 0 50px rgba(255,255,255,0.4);
            transform: translateY(-10px) rotateX(10deg);
        }

        .node-card h2 {
            font-size: 2.4rem;
            font-weight: normal;
            text-shadow: 0 4px 15px rgba(255, 255, 255, 0.4);
            display: inline-block;
            letter-spacing: 4px; 
            transform: scaleY(1.35); 
        }

        /* 末级详情页面 */
        .detail-view {
            max-width: 900px;
            width: 90%;
            text-align: center;
        }

        .image-box {
            width: 80%;
            max-width: 500px;
            height: 400px;
            background: #111;
            margin: 20px auto; 
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 4px; /* 可选：加一点点圆角让边缘不那么生硬 */
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 新增：多图网格相册容器 */
        .gallery-box {
            width: 90%;
            max-width: 1200px;
            margin: 20px auto;
            display: grid;
            /* 核心魔法：根据屏幕宽度自动安排列数，每张图最小 300px 宽 */
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px; /* 图片之间的间距 */
        }

        .gallery-item {
            height: 250px; /* 统一图片高度 */
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            overflow: hidden;
            display: block;
            text-decoration: none;
            transition: transform 0.4s, box-shadow 0.4s;
        }

        /* 鼠标悬停时的优雅浮起发光效果 */
        .gallery-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.6);
            z-index: 2;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.6s;
        }

        /* 鼠标悬停时，图片本身微微放大 */
        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .placeholder-text {
            color: #444;
            /*font-family: monospace;*/
            letter-spacing: 2px;
        }

        .link-anchor {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 60px;
            border: 1px solid white;
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            letter-spacing: 4px;
            transition: 0.4s;
        }

        .link-anchor:hover {
            background: white;
            color: black;
            box-shadow: 0 0 30px white;
        }

        .desc-text {
            margin: 50px auto 0 auto; 
            width: 90%;
            max-width: 1200px;
            
            font-size: 1.5rem; 
            line-height: 2; 
            color: rgba(255, 255, 255, 0.85); 
            
            text-align: center; 
            letter-spacing: 2px;
            
            border: 1px solid rgba(255, 255, 255, 0.2); /* 半透明的白色边框 */
            border-radius: 8px; /* 边框圆角，看起来更柔和精致 */
            padding: 30px; /* 让文字和边框之间留出呼吸空间，避免文字贴着边框 */
            background: rgba(255, 255, 255, 0.03); /* 添加和卡片同款的极弱背景色，增加高级感 */
            
            max-height: 35vh; 
            overflow-y: auto; 
        }

        .desc-text::-webkit-scrollbar {
            width: 4px; /* 非常细的滚动条 */
        }
        .desc-text::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05); /* 透明轨道 */
        }
        .desc-text::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2); /* 半透明滑块 */
            border-radius: 2px;
        }
        .desc-text::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5); /* 鼠标悬停时变亮 */
        }

    </style>
</head>

                                                    { img: "图片链接1.jpg", link: "跳转链接1" },
                                                ],
                                                desc: "主要有密西西比河，是世界第四长河"
                                            }
                                        ]
                                    },
                                    {
                                        id: "c4-2-5",
                                        title: "南美洲地区",
                                        children: [
                                            {
                                                id: "c4-2-5-1",
                                                title: "地形",
                                                gallery: [
                                                    { img: "图片链接1.jpg", link: "跳转链接1" },
                                                ],
                                                desc: "西部是安第斯山脉，东部平原与高原相间分布"
                                            },
                                            {
                                                id: "c4-2-3-2",
                                                title: "气候",
                                                gallery: [
                                                    { img: "图片链接1.jpg", link: "跳转链接1" },
                                                ],
                                                desc: "以热带气候为主，是世界上最湿润的大洲"
                                            }
                                        ]
                                    }
                                    ]
                                },
                                {
                                    id: "c4-2-6",
                                    title: "大洋洲地区",
                                    children: [
                                        {
                                            id: "c4-2-6-1",
                                            title: "澳大利亚大陆",
                                            gallery: [
                                                { img: "图片链接1.jpg", link: "跳转链接1" },
                                            ],
                                            desc: "地形：三大地形区——东部山地（大分水岭）、中部平原（大自流盆地）、西部高原<br>气候：呈半环状分布，干旱面积广，热带沙漠、热带草原气候为主<br>特色：大堡礁（世界最大珊瑚礁群）、特有动物（袋鼠、考拉、鸭嘴兽）"
                                        },
                                        {
                                            id: "c4-2-3-2",
                                            title: "新西兰",
                                            gallery: [
                                                { img: "图片链接1.jpg", link: "跳转链接1" },
                                            ],
                                            desc: "地形：多山地丘陵，火山、温泉广布<br>气候：温带海洋性气候，畜牧业发达"
                                        }
                                    ]
                                },
                                {
                                    id: "c4-2-7",
                                    title: "南极洲地区",
                                    gallery: [
                                        { img: "图片链接1.jpg", link: "跳转链接1" },
                                    ],
                                    desc: "地形：平均海拔最高的大洲，覆盖巨厚冰层，有“冰雪高原”之称<br>气候：酷寒、干燥、烈风，是世界最冷、风力最强的大洲<br>科考：中国建有长城站、中山站、昆仑站、泰山站<br>资源：淡水资源（冰川）、矿产（煤、铁）、海洋生物资源丰富"
                                }
                            ]
                        }
                    ]
                }
            ]
        };

        // 状态管理
        let currentState = treeData;
        let historyStack = [];
        const stage = document.getElementById('main-stage');
        const header = document.getElementById('nav-header');

        /**
         * 2. 核心渲染逻辑
         */
        function render() {
            stage.innerHTML = '';
            
            // 更新面包屑和返回按钮
            header.style.opacity = currentState.id === 'root' ? 0 : 1;
            document.getElementById('breadcrumb').innerText = historyStack.map(i => i.title).join(' / ');

            if (currentState.id === "root") {
                // 渲染首页
                const div = document.createElement('div');
                div.className = 'home-hero';
                div.innerHTML = `<h1>${currentState.title}</h1>`;
                div.onclick = () => navigateTo(currentState); 
                stage.appendChild(div);
                gsap.from(div, { duration: 2, opacity: 0, y: 50, ease: "expo.out" });

            } else if (currentState.children && currentState.children.length > 0) {
                // 渲染分支层级 (Grid 布局)
                const grid = document.createElement('div');
                grid.className = 'grid-container';
                
                currentState.children.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'node-card';
                    card.innerHTML = `<h2>${item.title}</h2>`;
                    card.onclick = () => navigateTo(item);
                    grid.appendChild(card);
                    
                    gsap.from(card, {
                        duration: 1,
                        opacity: 0,
                        y: 80,
                        rotateX: -45,
                        delay: index * 0.1,
                        ease: "power4.out"
                    });
                });
                stage.appendChild(grid);
            } else {
                // 渲染末端内容页
                const detail = document.createElement('div');
                detail.className = 'detail-view';
                detail.innerHTML = `
                    <h1 style="font-size:3rem; font-weight:normal; letter-spacing:2px; text-shadow:0 4px 15px rgba(255,255,255,0.4); transform:scaleY(1.15); display:inline-block;">${currentState.title}</h1>
                    
                    ${currentState.hideImage ? '' : `
                    <div class="image-box">
                        <a href="${currentState.link || '#'}" target="_blank" style="display: block; width: 100%; height: 100%; text-decoration: none;">
                            ${currentState.img 
                                ? `<img src="${currentState.img}" style="cursor: pointer; width: 100%; height: 100%; object-fit: cover;">` 
                                : `<div class="placeholder-text" style="cursor: pointer; height: 100%; display: flex; align-items: center; justify-content: center;">[ IMAGE INTERFACE: ${currentState.title} ]</div>`
                            }
                        </a>
                    </div>
                    `}

                    ${currentState.desc ? `
                    <div class="desc-text">
                        ${currentState.desc}
                    </div>
                    ` : ''}
                `;
                stage.appendChild(detail);
                gsap.from(detail, { duration: 1, opacity: 0, scale: 0.9, ease: "power2.out" });
            }
        }

        function navigateTo(node) {
            // 如果是首页点击，我们实际上是想进入它的 children 层级
            const nextTarget = (node.id === 'root') ? { ...node, id: 'first_level' } : node;
            
            gsap.to(stage, { duration: 0.5, opacity: 0, scale: 1.1, onComplete: () => {
                historyStack.push(currentState);
                currentState = nextTarget;
                render();
                gsap.to(stage, { duration: 0.5, opacity: 1, scale: 1 });
            }});
        }

        function handleBack() {
            if (historyStack.length > 0) {
                gsap.to(stage, { duration: 0.5, opacity: 0, scale: 0.9, onComplete: () => {
                    currentState = historyStack.pop();
                    render();
                    gsap.to(stage, { duration: 0.5, opacity: 1, scale: 1 });
                }});
            }
        }

        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speedX: Math.random() * 0.2 - 0.1,
                    speedY: Math.random() * 0.2 - 0.1
                });
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            particles.forEach(p => {
                p.x += p.speedX; p.y += p.speedY;
                if(p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if(p.y < 0 || p.y > canvas.height) p.speedY *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animate();
        
        render();

    </script>
</body>
</html>
