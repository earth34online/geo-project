<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.8);
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'SimSun', 'Songti SC', 'STSong', serif;
            overflow: hidden;
            /* 防止滚动条破坏华丽感 */
            height: 100vh;
            width: 100vw;
        }

        /* 华丽背景粒子 */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            filter: blur(1px);
        }

        /* 顶部导航 */
        #nav-header {
            position: fixed;
            top: 40px;
            width: 100%;
            padding: 0 50px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
            opacity: 0;
        }

        .back-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: white;
            color: black;
        }

        /* 主容器 */
        #main-stage {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
        }

        /* 首页大标题 */
        .home-hero h1 {
            font-size: 6rem;
            letter-spacing: 20px;
            text-align: center;
            cursor: pointer;
            font-weight: 200;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        /* 节点网格 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            width: 80%;
            max-width: 1000px;
            margin-top: -100px;
        }

        .node-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 100px 62px;
            text-align: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.6s;
            position: relative;
            overflow: hidden;
        }

        .node-card:hover {
            background: rgba(255, 255, 255, 1);
            color: black;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.4);
            transform: translateY(-10px) rotateX(10deg);
        }

        .node-card h2 {
            font-size: 2.4rem;
            font-weight: normal;
            text-shadow: 0 4px 15px rgba(255, 255, 255, 0.4);
            display: inline-block;
            letter-spacing: 4px;
            transform: scaleY(1.35);
        }

        /* 末级详情页面 */
        .detail-view {
            max-width: 900px;
            width: 90%;
            text-align: center;
        }

        .image-box {
            width: 80%;
            max-width: 500px;
            height: 400px;
            background: #111;
            margin: 20px auto;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 4px;
            /* 可选：加一点点圆角让边缘不那么生硬 */
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 新增：多图网格相册容器 */
        .gallery-box {
            width: 90%;
            max-width: 1200px;
            margin: 20px auto;
            display: grid;
            /* 核心魔法：根据屏幕宽度自动安排列数，每张图最小 300px 宽 */
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            /* 图片之间的间距 */
        }

        .gallery-item {
            height: 250px;
            /* 统一图片高度 */
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            overflow: hidden;
            display: block;
            text-decoration: none;
            transition: transform 0.4s, box-shadow 0.4s;
        }

        /* 鼠标悬停时的优雅浮起发光效果 */
        .gallery-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.6);
            z-index: 2;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.6s;
        }

        /* 鼠标悬停时，图片本身微微放大 */
        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .placeholder-text {
            color: #444;
            /*font-family: monospace;*/
            letter-spacing: 2px;
        }

        .link-anchor {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 60px;
            border: 1px solid white;
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            letter-spacing: 4px;
            transition: 0.4s;
        }

        .link-anchor:hover {
            background: white;
            color: black;
            box-shadow: 0 0 30px white;
        }

        .desc-text {
            margin: 50px auto 0 auto;
            width: 90%;
            max-width: 1200px;

            font-size: 1.5rem;
            line-height: 2;
            color: rgba(255, 255, 255, 0.85);

            text-align: center;
            letter-spacing: 2px;

            border: 1px solid rgba(255, 255, 255, 0.2);
            /* 半透明的白色边框 */
            border-radius: 8px;
            /* 边框圆角，看起来更柔和精致 */
            padding: 30px;
            /* 让文字和边框之间留出呼吸空间，避免文字贴着边框 */
            background: rgba(255, 255, 255, 0.03);
            /* 添加和卡片同款的极弱背景色，增加高级感 */

            max-height: 35vh;
            overflow-y: auto;
        }

        .desc-text::-webkit-scrollbar {
            width: 4px;
            /* 非常细的滚动条 */
        }

        .desc-text::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            /* 透明轨道 */
        }

        .desc-text::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            /* 半透明滑块 */
            border-radius: 2px;
        }

        .desc-text::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
            /* 鼠标悬停时变亮 */
        }
        @media (max-width: 768px) {
            body {
                overflow-y: auto; 
                height: auto;
            }
            
            #main-stage {
                height: auto;
                min-height: 100vh;
                padding: 70px 0 30px 0; 
                align-items: flex-start; 
            }

            .home-hero {
                margin: auto;
            }

            /* 详情页自动居中 */
            .detail-view {
                margin: auto;
            }
            .grid-container {
                grid-template-columns: 1fr;
                gap: 15px; 
                width: 90%;
                margin: 0 auto; 
                margin-top: 20px; 
                padding-bottom: 50px; 
            }
            .node-card {
                padding: 40px 20px;
            }
            .node-card h2 {
                font-size: 1.8rem;
                letter-spacing: 2px;
            }
    
            #nav-header {
                padding: 0 15px;
                top: 20px;
            }
            .back-btn {
                padding: 8px 12px;
                font-size: 0.8rem;
            }
            .detail-view h1 {
                font-size: 2rem !important;
            }
            .gallery-box {
                grid-template-columns: 1fr; /* 手机上单列显示图片 */
            }
            .gallery-item {
                height: 200px;
            }
            .desc-text {
                font-size: 1.1rem;
                padding: 15px;
                width: 100%;
                max-height: none; /* 手机上完全展开文字 */
            }
        }

        // 状态管理
        let currentState = treeData;
        let historyStack = [];
        const stage = document.getElementById('main-stage');
        const header = document.getElementById('nav-header');

        /**
         * 2. 核心渲染逻辑
         */
        function render() {
            stage.innerHTML = '';

            // 更新面包屑和返回按钮
            header.style.opacity = currentState.id === 'root' ? 0 : 1;
            document.getElementById('breadcrumb').innerText = historyStack.map(i => i.title).join(' / ');

            if (currentState.id === "root") {
                // 渲染首页
                const div = document.createElement('div');
                div.className = 'home-hero';
                div.innerHTML = `<h1>${currentState.title}</h1>`;
                div.onclick = () => navigateTo(currentState);
                stage.appendChild(div);
                gsap.from(div, { duration: 2, opacity: 0, y: 50, ease: "expo.out" });

            } else if (currentState.children && currentState.children.length > 0) {
                // 渲染分支层级 (Grid 布局)
                const grid = document.createElement('div');
                grid.className = 'grid-container';

                currentState.children.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'node-card';
                    card.innerHTML = `<h2>${item.title}</h2>`;
                    card.onclick = () => navigateTo(item);
                    grid.appendChild(card);

                    gsap.from(card, {
                        duration: 1,
                        opacity: 0,
                        y: 80,
                        rotateX: -45,
                        delay: index * 0.1,
                        ease: "power4.out"
                    });
                });
                stage.appendChild(grid);

            } else {
                // 渲染末端内容页
                const detail = document.createElement('div');
                detail.className = 'detail-view';

                // 兼容旧字段 img/link，也兼容你现在主要在用的 gallery
                const gallery = Array.isArray(currentState.gallery) ? currentState.gallery : [];
                const firstImage = gallery[0] || null;
                const fallbackImg = currentState.img || '';
                const fallbackLink = currentState.link || '#';

                let mediaHTML = '';

                if (!currentState.hideImage) {
                    // 多图：使用你原本已经写好的 gallery 样式
                    if (gallery.length > 1) {
                        mediaHTML = `
                    <div class="gallery-box">
                        ${gallery.map(item => `
                            <a 
                                class="gallery-item" 
                                href="${item.link || '#'}" 
                                target="_blank" 
                                style="text-decoration:none;"
                            >
                                ${item.img
                                ? `<img src="${item.img}" alt="${currentState.title}" style="width:100%; height:100%; object-fit:cover; display:block;">`
                                : `<div class="placeholder-text" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">[ IMAGE INTERFACE: ${currentState.title} ]</div>`
                            }
                            </a>
                        `).join('')}
                    </div>
                `;
                    } else {
                        // 单图：保持你原来 image-box 的展示方式
                        const finalImg = firstImage?.img || fallbackImg;
                        const finalLink = firstImage?.link || fallbackLink;

                        mediaHTML = `
                    <div class="image-box">
                        <a href="${finalLink}" target="_blank" style="display: block; width: 100%; height: 100%; text-decoration: none;">
                            ${finalImg
                                ? `<img src="${finalImg}" style="cursor: pointer; width: 100%; height: 100%; object-fit: cover;">`
                                : `<div class="placeholder-text" style="cursor: pointer; height: 100%; display: flex; align-items: center; justify-content: center;">[ IMAGE INTERFACE: ${currentState.title} ]</div>`
                            }
                        </a>
                    </div>
                `;
                    }
                }

                detail.innerHTML = `
            <h1 style="font-size:3rem; font-weight:normal; letter-spacing:2px; text-shadow:0 4px 15px rgba(255,255,255,0.4); transform:scaleY(1.15); display:inline-block;">
                ${currentState.title}
            </h1>
            
            ${mediaHTML}

            ${currentState.desc ? `
            <div class="desc-text">
                ${currentState.desc}
            </div>
            ` : ''}
        `;

                stage.appendChild(detail);
                gsap.from(detail, { duration: 1, opacity: 0, scale: 0.9, ease: "power2.out" });
            }
        }

        function navigateTo(node) {
            // 如果是首页点击，我们实际上是想进入它的 children 层级
            const nextTarget = (node.id === 'root') ? { ...node, id: 'first_level' } : node;

            gsap.to(stage, {
                duration: 0.5, opacity: 0, scale: 1.1, onComplete: () => {
                    historyStack.push(currentState);
                    currentState = nextTarget;
                    render();
                    gsap.to(stage, { duration: 0.5, opacity: 1, scale: 1 });
                }
            });
        }

        function handleBack() {
            if (historyStack.length > 0) {
                gsap.to(stage, {
                    duration: 0.5, opacity: 0, scale: 0.9, onComplete: () => {
                        currentState = historyStack.pop();
                        render();
                        gsap.to(stage, { duration: 0.5, opacity: 1, scale: 1 });
                    }
                });
            }
        }

        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speedX: Math.random() * 0.2 - 0.1,
                    speedY: Math.random() * 0.2 - 0.1
                });
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            particles.forEach(p => {
                p.x += p.speedX; p.y += p.speedY;
                if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animate();

        render();

    </script>
